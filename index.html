<html>

  <head>
    <title>SPIDERMAN</title>

    <link href="https://fonts.cdnfonts.com/css/spiderman" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">


    <style>
      body
      {
        background-color: #eef4f8;
      }
    h1
     {
      font-family:'spiderman', sans-serif;
      color:red;
      text-align:center;
      margin-top:2%;
      margin-bottom:2%;
      font-size: clamp(40px, 6vw, 80px);
    }

    .container
    {
      background-color: #fceec8;
      padding:5%;
      display: flex;
      align-items: center;
      border-radius:35px;
      height: 60vh;
      justify-content: space-between;
      gap:40px;
      margin-left:5%;
      margin-right:5%;
      border:3px solid black;
      box-shadow: 12px 12px 0px red;
      margin-bottom: 30vh;

    }

    .text
    {
      flex: 1;
      width:50%;
      font-family:Arial;
      text-align: left;
      font-size:200%;
      line-height:2;
    }

    .image img
    {
      height:100%;
      width:100%;
      object-fit: cover;
      border-radius:30px;
      border: 3px solid #0c0e0b;
    }
    .image:hover
    {
      transform: scale(1.01);
    }
    
    .buttons
    {
      display:flex;
      justify-content: center;
      gap: 120px;
      margin-top: 80px;
    }
    
    .btn 
    {
      background-color: blue;
      color: white;
      padding:20px;
      border: none;
      border-radius: 5px;
      border-radius: 20px;
      font-size: 17px;
      height:60px;
      width:15vw;
      font-family: 'Inter', sans-serif;
      box-shadow: 5px 5px 0px red;
      border: 2px;
      border-right: 1px solid white;
      border-bottom: 1px solid white;
      transition: all 0.1s ease;
      cursor: pointer;

    }

    .btn:active
    {
      transform: translate(5px, 5px);
      box-shadow: none;
    }

    .btn:hover
    {
      background-color: blueviolet;
      border-radius: 25px;
      width: 15vw;
      border: 3px blue;
    }

    .container2-cards
    {
      width:80vw;
      margin:50px auto;
      padding: 0px;
      height: 80vh;
      

      background-color: aliceblue;
      border-radius: 25px;
      position: relative;
      overflow: hidden;
      border:3px solid black;
      box-shadow: 12px 12px 0px red;
      margin-bottom: 30vh;
      transition: transform 0.15s ease-out;
    }
    .container2-cards:hover
    {
      transform: scale(0.95);
    }



    .card
    {
      position:absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;


      opacity:0;
      transform:translateY(20px);
      transition: all 0.2s ease;

    }

    .card.active
    {
      transform: translateY(0);
      opacity:1;
    }

    .card img 
    {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card p
    {
      color: white;
      font-family: 'Inter' , sans-serif;
      margin-bottom: 15px;
      transform: translate(-50%, -50%);
      position: absolute;
      padding: 8px 12px;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      top: 50%;
      left:50%;
      font-weight:bold;
      text-shadow: 2px 2px 5px black;

    }

    .img-box
    {
      width: 100%;
      height: 100%;
      border-radius:20px;
      text-align: center;
      color: white;
      position: relative;
    }

    .img-box img
    {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-grid
    {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4vh;
      padding: 4vh;
      width: 80vw;
      grid-auto-rows: 20vw;
      margin: 0 auto;
      box-sizing: border-box;
      margin-bottom: 30vh;
      border: 3px black;
    }

    [class^="image-block"]
    {
      overflow: hidden;
      border-radius: 10px;
      transition: transform 0.15s ease-out;
      border: 3px solid #0c0e0b;
    }

    [class^="image-block"] img
    {
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }

    .image-block-1
    {
      grid-column: 1 / 3;
      grid-row: 1;
    }
    .image-block-2
    {
      grid-column: 3 / 4;
      grid-row: 1;
    }
    .image-block-3
    {
      grid-column: 4 / 5;
      grid-row: 1 / 3;
    }
    .image-block-4
    {
      grid-column: 1 / 2;
      grid-row: 2;
    }
    .image-block-5
    {
      grid-column: 2 / 4;
      grid-row: 2;
    }

    [class^="image-block"]:hover
    {
      transform: scale(1.1);
    }

    .container-question
    {
      text-align: center;
      display: flex;
      flex-direction: column;
      color: black;
      background-color: #ADD3E7;
      border-radius: 5vw;
      margin-bottom: 50vh;
      box-shadow: 1vh 1vh 0px #CB3047;
      border: 3px solid black;
      max-width: 70vw;
      margin-left: auto;
      margin-right: auto;

      
    }

    label
    {
      margin-bottom: 2vh;
      margin-top: 2vh;
      font-weight: bold;
      font-size: 3vh;
      font-family: sans-serif;
      color: #CB3047;
    }
    input
    {
      width: 30vw;
      align-self: center;
      font-family: Arial;
      border-radius: 3vw;
      padding:1vw;
      border: none;
      outline: none;
      margin-bottom: 3vh;
      transition: all 0.1s ease;
      
    }
    input:focus
    {
      box-shadow: 2px 2px 2px  #0D2750;
      width: 50vw;
    }
    input:active
    {
      
    }
    input:hover
    {
      box-shadow: 0px 0px 3px white;
    }

    button
    {
      width: 6vw;
      align-self: center;
      border-radius: 2vw;
      margin-bottom: 4vh;
      outline: none;
      border:none;
      background-color: #CB3047;
      color: white;
      padding: 1vw;
      width: 15vw;
      box-shadow: 4px 5px 0px #1866A3;
      transition: all 0.1s ease;
    }
    button:active
    {
      transform: translate(4px, 5px);
      box-shadow: none;
    }
    button:hover
    {
      width: 17vw;
      cursor: pointer;
    }


    #spider-wiki
    {
      display: block;
      text-decoration: none;
    }


    #wiki-container6
    {
      background-color: #74b4d9;
      margin-left: auto;
      margin-right: auto;
      width: 30vw;
      display: block;
      border-radius: 6vw;
      padding: 0.5vh;
      border: 3px solid #0c0e0b;
      margin-bottom: 10vh;
      transition: all 0.3s ease;
      
      
    }
    #wiki-container6 p
    {
      color: #10367d;
      font-weight: bolder;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 1vh;
      font-size: 18px;
    }
    #wiki-container6:hover
    {
      background-color: #10367d;
      width: 40vw;
      box-shadow: 0px 0px 5px black;
    }
    #wiki-container6:hover p
    {
      color: white;
    }




    
  </style>

  
  </head>

  <script>
    function showCard(num)
    {
      document.getElementById("card1").classList.remove("active");
      document.getElementById("card2").classList.remove("active");
      document.getElementById("card3").classList.remove("active");

      document.getElementById("card" + num).classList.add("active");
    }

    window.onload=function(){
      showCard(3);
    }
  </script>


  
  <body>
    <h1>SPIDERMAN</h1>

    <div class="container">

      <div class="text">
        Spiderman is the coolest hero!!<br>
        He shoots webs and swings through the city helping the helpless....
      </div>

      <div class="image">
        <img src="https://i.pinimg.com/736x/aa/e1/0e/aae10e78dca5351b5f56a1f7b5f42139.jpg" alt="I am busy now">
      </div>
    </div>

    <div class="buttons">
      <button class="btn" onclick="showCard(1)" >Strong</button>
      <button class="btn" onclick="showCard(2)">Spider Sense</button>
      <button class="btn" onclick="showCard(3)">Cool</button>
    </div>

    <div class="container2-cards">
      
      <div class="card" id="card1">
        <p>Spiderman is very strong</p>
        <img src="https://i.pinimg.com/736x/9b/87/b6/9b87b6e029a21c146b812e661140e5e2.jpg" title="trong">
      </div>

      <div class="card" id="card2">
        <p>Spiderman has a keen sense of humour</p>
        <img src="https://i.pinimg.com/1200x/5f/bb/e4/5fbbe4043b428fa098e7741e1488e9ae.jpg" title="spider sense">
      </div>

      <div class="card" id="card3">
        <p>Spiderman is so cool</p>
        <img src="https://i.pinimg.com/1200x/3f/d7/08/3fd7086a7a8782ee8095f318891d6c30.jpg" title="cool">
      </div>
    </div>
    
    <br>

    <div class="image-grid">
      <div class="image-block-1">
        <img src="https://imgs.search.brave.com/3kmqht3ilgH-A_9-93CVnmTtBXafSM8fLl5vPkHoxbk/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93YWxs/cGFwZXJzLmNvbS9p/bWFnZXMvaGQvc3Bp/ZGVyLW1hbi1jb21p/Yy1lOGs3bmY2cmRo/ZHN4ZDBmLmpwZw">
      </div>

      <div class="image-block-2">
        <img src="https://i.pinimg.com/736x/bf/56/87/bf5687eb594579c1d8b575264796c279.jpg" >
      </div>

      <div class="image-block-3">
        <img src="https://i.pinimg.com/736x/b5/26/ce/b526ce9bdd9afff94cfd4635f8e61d17.jpg">
      </div>

      <div class="image-block-4">
        <img src="https://i.pinimg.com/736x/84/57/73/845773bc21f6fd9ff66c13e767cf5122.jpg">
      </div>

      <div class="image-block-5">
        <img src="https://i.pinimg.com/736x/8f/6d/27/8f6d27cadb34d30d8b94f5406b29c4d0.jpg">
      </div>

      

    </div>

    <div class="container-question">
      <label for="question">Do you like Spiderman?</label>

      <input type="text" id="answer" name="answer" placeholder="Answer here..">
      <button type="submit" id="btn-submit">send answer</button>
    </div>

    <a href="https://en.wikipedia.org/wiki/Spider-Man" target="_blank" id="spider-wiki">
      <div id="wiki-container6">
        <p>Know more about Spiderman↗</p>
      </div>
    </a>




    <script>
      const btn = document.getElementById('btn-submit');
      const input = document.getElementById('answer');
      btn.addEventListener('click', function()
      {
        input.value="";
      });
    </script>
  </body>
</html>
